name: Generate contribution animation

on:
  schedule:
    - cron: "18 16 * * *"
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme color: auto, spring, summer, autumn, winter, new-year, hacker"
        required: false
        default: "auto"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Select theme color
        shell: bash
        run: |
          theme="${{ github.event.inputs.theme || 'auto' }}"
          month="$(date -u +%m)"

          if [[ "$theme" == "auto" ]]; then
            case "$month" in
              01|02) theme="new-year" ;;
              03|04|05) theme="spring" ;;
              06|07|08) theme="summer" ;;
              09|10) theme="autumn" ;;
              11|12) theme="winter" ;;
            esac
          fi

          case "$theme" in
            spring)
              light="#16a34a"
              dark="#86efac"
              ;;
            summer)
              light="#0284c7"
              dark="#22d3ee"
              ;;
            autumn)
              light="#d97706"
              dark="#fbbf24"
              ;;
            winter)
              light="#2563eb"
              dark="#93c5fd"
              ;;
            new-year)
              light="#dc2626"
              dark="#facc15"
              ;;
            hacker)
              light="#16a34a"
              dark="#00ff66"
              ;;
            *)
              light="#0f766e"
              dark="#f59e0b"
              theme="classic"
              ;;
          esac

          echo "theme=$theme" >> "$GITHUB_OUTPUT"
          echo "light_color=$light" >> "$GITHUB_OUTPUT"
          echo "dark_color=$dark" >> "$GITHUB_OUTPUT"
        id: theme

      - name: Generate contribution SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution.svg?color_snake=${{ steps.theme.outputs.light_color }}
            dist/github-contribution-dark.svg?palette=github-dark&color_snake=${{ steps.theme.outputs.dark_color }}

      - name: Publish contribution assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
